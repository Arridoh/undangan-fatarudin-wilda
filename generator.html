<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Generator Undangan - Mobile Optimized</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8 min-h-screen flex items-center justify-center">

    <div class="max-w-xl w-full bg-white p-5 sm:p-8 rounded-2xl shadow-xl border border-slate-200/60 transition-all duration-300">
        <div class="flex items-center gap-3 mb-6 border-b border-slate-100 pb-4">
            <div class="p-2.5 bg-slate-800 text-white rounded-xl shadow-md shadow-slate-800/10">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5l-1.1 1.1"/></svg>
            </div>
            <div>
                <h2 class="text-lg font-bold text-slate-800 tracking-tight">Link Generator</h2>
                <p class="text-xs text-slate-400">Kelola distribusi undangan pernikahan via WhatsApp</p>
            </div>
        </div>
        
        <div class="space-y-5">
            <div>
                <label class="block text-xs uppercase tracking-wider font-semibold text-slate-500 mb-2">Nama Penerima Tamu</label>
                <input type="text" id="input-name" placeholder="Contoh: Bapak Ahmad & Keluarga" class="w-full p-3.5 border border-slate-200 rounded-xl focus:outline-none focus:border-slate-800 focus:ring-4 focus:ring-slate-800/5 transition text-base text-slate-700 placeholder-slate-400">
            </div>
            <div>
                <label class="block text-xs uppercase tracking-wider font-semibold text-slate-500 mb-2">Nomor WhatsApp (Awali Kode Negara 62)</label>
                <input type="tel" id="input-phone" placeholder="Contoh: 628123456789" class="w-full p-3.5 border border-slate-200 rounded-xl focus:outline-none focus:border-slate-800 focus:ring-4 focus:ring-slate-800/5 transition text-base text-slate-700 placeholder-slate-400">
            </div>
            
            <button onclick="generateLink()" class="w-full bg-slate-800 text-white p-4 rounded-xl font-semibold hover:bg-slate-700 active:scale-[0.99] transition shadow-lg shadow-slate-800/10 flex items-center justify-center gap-2 tracking-wide text-sm sm:text-base">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                Generate & Kirim WA
            </button>
        </div>

        <div class="mt-6 pt-6 border-t border-slate-100 hidden" id="result-box">
            <div class="flex justify-between items-center mb-2">
                <p class="text-xs uppercase tracking-wider font-semibold text-slate-500">Tautan Unik Tamu:</p>
                <button onclick="copyGeneratedLink(this)" class="text-xs font-medium text-slate-600 bg-slate-100 px-3 py-1.5 rounded-lg hover:bg-slate-200 active:scale-95 transition">
                    Salin Link
                </button>
            </div>
            <textarea id="result-url" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-mono h-24 text-slate-600 resize-none focus:outline-none" readonly></textarea>
        </div>
    </div>

    <script>
        function generateLink() {
            const name = document.getElementById('input-name').value;
            const phone = document.getElementById('input-phone').value;
            
            if(!name) return alert('Nama tamu tidak boleh kosong.');

            const baseUrl = window.location.href.replace('generator.html', '');
            const guestUrl = `${baseUrl}?to=${encodeURIComponent(name)}`;
            
            document.getElementById('result-url').value = guestUrl;
            document.getElementById('result-box').classList.remove('hidden');

            if(phone) {
                const waMessage = `Tanpa mengurangi rasa hormat, kami mengundang Bapak/Ibu/Saudara/i *${name}* untuk menghadiri acara pernikahan kami. Detail undangan dapat dilihat pada tautan berikut:\n\n${guestUrl}`;
                window.open(`https://api.whatsapp.com/send?phone=${phone}&text=${encodeURIComponent(waMessage)}`, '_blank');
            }
        }

        function copyGeneratedLink(button) {
            const textarea = document.getElementById('result-url');
            navigator.clipboard.writeText(textarea.value).then(() => {
                const originalText = button.innerText;
                button.innerText = "Tersalin!";
                button.classList.replace('bg-slate-100', 'bg-emerald-50');
                button.classList.add('text-emerald-700', 'font-semibold');
                
                setTimeout(() => {
                    button.innerText = originalText;
                    button.classList.replace('bg-emerald-50', 'bg-slate-100');
                    button.classList.remove('text-emerald-700', 'font-semibold');
                }, 2000);
            });
        }
    </script>
</body>
</html>
